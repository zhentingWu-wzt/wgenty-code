name: CI - 构建、测试和质量检查

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Rust 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - name: 检查代码
        run: cargo check --all-targets

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - name: 运行测试
        run: cargo test --all

  fmt:
    name: 代码格式检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: 检查代码格式
        run: cargo fmt -- --check

  clippy:
    name: Clippy 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - name: 运行 Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: 构建可执行文件
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: wgenty-code
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: wgenty-code.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: wgenty-code
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - name: 构建 Release 版本
        if: runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }}
      - name: 构建 Release 版本 (Windows, bundled SQLite)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} --features bundled-sqlite
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binary
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
