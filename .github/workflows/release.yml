name: Release — Build and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wgenty-code.exe
            asset_name: wgenty-code-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t wgenty-code:${{ github.ref_name }} .
          docker tag wgenty-code:${{ github.ref_name }} wgenty-code:latest

      - name: Verify Image
        run: docker run --rm wgenty-code:latest --version
