name: Release — Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wgenty-code.exe
            asset_name: wgenty-code-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t wgenty-code:${{ github.ref_name }} .
          docker tag wgenty-code:${{ github.ref_name }} wgenty-code:latest

      - name: Verify Image
        run: docker run --rm wgenty-code:latest --version
