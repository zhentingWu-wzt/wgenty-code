name: Release - Build and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-x86_64
            bundled_sqlite: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-aarch64
            bundled_sqlite: "--features bundled-sqlite"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-x86_64
            bundled_sqlite: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-aarch64
            bundled_sqlite: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wgenty-code.exe
            asset_name: wgenty-code-windows-x86_64.exe
            bundled_sqlite: "--features bundled-sqlite"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.bundled_sqlite }}

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

      - name: Upload binary artifact for npm
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          retention-days: 3

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t wgenty-code:${{ github.ref_name }} .
          docker tag wgenty-code:${{ github.ref_name }} wgenty-code:latest

      - name: Verify Image
        run: docker run --rm wgenty-code:latest --version

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    # Only publish on version tags.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Assemble npm packages
        run: bash npm/scripts/assemble.sh "${{ steps.ver.outputs.version }}" artifacts npm-dist

      - name: Publish platform subpackages
        run: |
          for sub in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            echo "::group::publish wgenty-code-$sub"
            (cd "npm-dist/wgenty-code-$sub" && npm publish --access public)
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: (cd npm-dist/wgenty-code && npm publish --access public)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
