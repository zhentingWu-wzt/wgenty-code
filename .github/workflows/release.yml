name: Release - Build and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-x86_64
            bundled_sqlite: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: wgenty-code
            asset_name: wgenty-code-linux-aarch64
            bundled_sqlite: "--features bundled-sqlite"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-x86_64
            bundled_sqlite: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wgenty-code
            asset_name: wgenty-code-macos-aarch64
            bundled_sqlite: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wgenty-code.exe
            asset_name: wgenty-code-windows-x86_64.exe
            bundled_sqlite: "--features bundled-sqlite"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: wgenty-code.exe
            asset_name: wgenty-code-windows-aarch64.exe
            bundled_sqlite: "--features bundled-sqlite"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          # Only the cross-compiler toolchain is needed: arboard (the sole
          # x11/wayland consumer) has been removed, and SQLite is compiled from
          # source via `--features bundled-sqlite`. Installing `:arm64` arch
          # packages required `dpkg --add-architecture arm64`, whose
          # `apt-get update` 404s on security.ubuntu.com for arm64 noble suites
          # - so we avoid multiarch entirely.
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Set version from tag
        shell: python
        run: |
          import os, re, sys
          # Git tags may use zero-padded patch numbers (v0.3.002). Cargo/semver
          # rejects leading zeros, so normalize only what we write to Cargo.toml.
          raw = os.environ['GITHUB_REF_NAME'].lstrip('v')
          m = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(.*)', raw)
          if not m:
              print(f'::error::Tag version {raw!r} is not MAJOR.MINOR.PATCH[suffix]', file=sys.stderr)
              sys.exit(1)
          version = f'{int(m.group(1))}.{int(m.group(2))}.{int(m.group(3))}{m.group(4)}'
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'^version = ".*"', f'version = "{version}"', content, count=1, flags=re.MULTILINE)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          print(f'Set Cargo.toml version to {version} (from tag {raw})')

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.bundled_sqlite }}

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

      - name: Upload binary artifact for npm
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          retention-days: 3

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Set version from tag
        shell: python
        run: |
          import os, re, sys
          raw = os.environ['GITHUB_REF_NAME'].lstrip('v')
          m = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(.*)', raw)
          if not m:
              print(f'::error::Tag version {raw!r} is not MAJOR.MINOR.PATCH[suffix]', file=sys.stderr)
              sys.exit(1)
          version = f'{int(m.group(1))}.{int(m.group(2))}.{int(m.group(3))}{m.group(4)}'
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'^version = ".*"', f'version = "{version}"', content, count=1, flags=re.MULTILINE)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          print(f'Set Cargo.toml version to {version} (from tag {raw})')

      - name: Build Docker Image
        run: |
          docker build -t wgenty-code:${{ github.ref_name }} --build-arg BUILD_VERSION=${GITHUB_REF_NAME#v} .
          docker tag wgenty-code:${{ github.ref_name }} wgenty-code:latest

      - name: Verify Image
        run: docker run --rm wgenty-code:latest --version

  publish-platform:
    name: Publish wgenty-code-${{ matrix.sub }}
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub: linux-x64
            target: x86_64-unknown-linux-gnu
            asset: wgenty-code-linux-x86_64
            bin: wgenty-code
          - sub: linux-arm64
            target: aarch64-unknown-linux-gnu
            asset: wgenty-code-linux-aarch64
            bin: wgenty-code
          - sub: darwin-x64
            target: x86_64-apple-darwin
            asset: wgenty-code-macos-x86_64
            bin: wgenty-code
          - sub: darwin-arm64
            target: aarch64-apple-darwin
            asset: wgenty-code-macos-aarch64
            bin: wgenty-code
          - sub: win32-x64
            target: x86_64-pc-windows-msvc
            asset: wgenty-code-windows-x86_64.exe
            bin: wgenty-code.exe
          - sub: win32-arm64
            target: aarch64-pc-windows-msvc
            asset: wgenty-code-windows-aarch64.exe
            bin: wgenty-code.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Compute version
        id: ver
        shell: python
        run: |
          import os, re
          raw = os.environ['GITHUB_REF_NAME'].lstrip('v')
          m = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(.*)', raw)
          if not m:
              raise SystemExit(f'invalid tag version: {raw!r}')
          version = f'{int(m.group(1))}.{int(m.group(2))}.{int(m.group(3))}{m.group(4)}'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')
          print(f'npm version {version} (from tag {raw})')

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: artifacts

      - name: Assemble single platform package
        run: |
          set -euo pipefail
          pkg="@wuzhenting/${{ matrix.sub }}"
          dir="npm-dist/${{ matrix.sub }}"
          mkdir -p "$dir"
          cp "npm/platforms/${{ matrix.sub }}/package.json" "$dir/package.json"
          cp "artifacts/${{ matrix.asset }}" "$dir/${{ matrix.bin }}"
          if [[ "${{ matrix.bin }}" != *.exe ]]; then
            chmod +x "$dir/${{ matrix.bin }}"
          fi
          (cd "$dir" && npm pkg set version="${{ steps.ver.outputs.version }}" >/dev/null)

      - name: Publish (idempotent)
        run: |
          set -euo pipefail
          pkg="@wuzhenting/${{ matrix.sub }}"
          ver="${{ steps.ver.outputs.version }}"
          if npm view "${pkg}@${ver}" >/dev/null 2>&1; then
            echo "skip: ${pkg}@${ver} already published"
          else
            (cd "npm-dist/${{ matrix.sub }}" && npm publish --access public)
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    name: Publish main package
    needs: publish-platform
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Compute version
        id: ver
        shell: python
        run: |
          import os, re
          raw = os.environ['GITHUB_REF_NAME'].lstrip('v')
          m = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(.*)', raw)
          if not m:
              raise SystemExit(f'invalid tag version: {raw!r}')
          version = f'{int(m.group(1))}.{int(m.group(2))}.{int(m.group(3))}{m.group(4)}'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')
          print(f'npm version {version} (from tag {raw})')

      - name: Assemble main package
        run: |
          set -euo pipefail
          dir="npm-dist/wgenty-code"
          mkdir -p "$dir/bin"
          cp npm/wgenty-code/package.json "$dir/package.json"
          cp npm/wgenty-code/bin/wgenty-code.js "$dir/bin/wgenty-code.js"
          cp npm/wgenty-code/README.md "$dir/README.md"
          ver="${{ steps.ver.outputs.version }}"
          jq --arg v "$ver" \
            '.version=$v | .optionalDependencies = (.optionalDependencies | with_entries(.value = $v))' \
            "$dir/package.json" > "$dir/package.json.tmp"
          mv "$dir/package.json.tmp" "$dir/package.json"

      - name: Publish (idempotent)
        run: |
          set -euo pipefail
          pkg="wgenty-code"
          ver="${{ steps.ver.outputs.version }}"
          if npm view "${pkg}@${ver}" >/dev/null 2>&1; then
            echo "skip: ${pkg}@${ver} already published"
          else
            (cd "npm-dist/$pkg" && npm publish --access public)
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
